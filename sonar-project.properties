sonar.projectKey=ia-ccd-definitions
sonar.organization=hmcts
sonar.projectName=IA :: CCD Definitions
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# For pull request analysis, branch configuration is handled by Jenkins parameters

# Only scan the main project directories that definitely exist
sonar.sources=definitions,bin
sonar.inclusions=**/*.json,**/*.sh,**/*.js

sonar.exclusions=**/node_modules/**,**/target/**,**/coverage/**,**/test/**,**/tests/**,**/*.test.js,**/tmp/**,**/output/**

# Coverage and test reports (if they exist)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=coverage/test-report.xml
