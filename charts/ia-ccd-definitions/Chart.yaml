apiVersion: v2
name: ia-ccd-definition
home: https://github.com/hmcts/ia-ccd-definitions
version: 0.0.2
description: Immigration & Asylum CCD Definitions
maintainers:
  - name: HMCTS Immigration & Asylum Team
    email: ImmigrationandAsylum@HMCTS.NET
dependencies:
  - name: ccd
    version: ~9.2.1
    repository: 'oci://hmctspublic.azurecr.io/helm'
    condition: ccd.enabled
  - name: xui-webapp
    version: ~1.0.18
    repository: 'oci://hmctspublic.azurecr.io/helm'
    condition: xui-webapp.enabled
  - name: am-org-role-mapping-service
    version: ~0.0.68
    repository: 'oci://hmctspublic.azurecr.io/helm'
    condition: am-org-role-mapping-service.enabled
  - name: postgresql
    version: 1.1.0
    repository: 'oci://hmctspublic.azurecr.io/helm'
    condition: postgresql.enabled